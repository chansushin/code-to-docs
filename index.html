<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code → Docs</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&family=Inconsolata:wght@400;700&family=Source+Code+Pro:wght@400;700&family=Fira+Code:wght@400;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/variable/pretendardvariable.css">
    <!-- highlight.js CDN -->
    <link rel="stylesheet" id="hljs-theme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- Additional languages -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/go.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/rust.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
    <!-- KaTeX CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>Code <span class="arrow">→</span> Docs</h1>
            <span class="subtitle">Google Docs용 코드 블록 · 수식 포맷터</span>
        </header>

        <!-- Mode Tabs -->
        <div class="mode-tabs">
            <button id="tab-code" class="mode-tab active" data-mode="code">Code</button>
            <button id="tab-math" class="mode-tab" data-mode="math">LaTeX Math</button>
        </div>

        <!-- Code Mode Section -->
        <div id="code-mode-content" class="mode-content active">
        <!-- Options Bar -->
        <div class="options-bar">
            <div class="option-group">
                <label for="language">Language</label>
                <select id="language">
                    <option value="python" selected>Python</option>
                    <option value="c">C</option>
                    <option value="cpp">C++</option>
                    <option value="java">Java</option>
                    <option value="javascript">JavaScript</option>
                    <option value="go">Go</option>
                    <option value="rust">Rust</option>
                    <option value="bash">Bash</option>
                    <option value="sql">SQL</option>
                    <option value="plaintext">Plain Text</option>
                </select>
            </div>
            <div class="option-group">
                <label for="theme">Theme</label>
                <select id="theme">
                    <option value="github-light">GitHub Light</option>
                    <option value="github-dark">GitHub Dark</option>
                    <option value="vs-light" selected>VS Code Light</option>
                    <option value="vs-dark">VS Code Dark</option>
                    <option value="monokai">Monokai</option>
                </select>
            </div>
            <div class="option-group">
                <label for="font-size">Size</label>
                <select id="font-size">
                    <option value="9">9pt</option>
                    <option value="10">10pt</option>
                    <option value="11" selected>11pt</option>
                    <option value="12">12pt</option>
                    <option value="13">13pt</option>
                    <option value="14">14pt</option>
                </select>
            </div>
            <div class="option-group">
                <label for="font-family">Font</label>
                <select id="font-family">
                    <option value="Consolas">Consolas</option>
                    <option value="Inconsolata" selected>Inconsolata</option>
                    <option value="Courier New">Courier New</option>
                    <option value="Source Code Pro">Source Code Pro</option>
                    <option value="Fira Code">Fira Code</option>
                    <option value="JetBrains Mono">JetBrains Mono</option>
                </select>
            </div>
            <div class="option-group">
                <label for="korean-font">Korean Font</label>
                <select id="korean-font">
                    <option value="'Nanum Gothic'" selected>Nanum Gothic</option>
                    <option value="'Pretendard'">Pretendard</option>
                    <option value="'Noto Sans KR'">Noto Sans KR</option>
                </select>
            </div>
        </div>

        <!-- Caption -->
        <div class="caption-section">
            <label for="caption">Caption (optional)</label>
            <input type="text" id="caption" placeholder="예: 예제 3: 이진 탐색">
        </div>

        <!-- Code Input -->
        <div class="code-section">
            <div class="section-header">
                <label>Code</label>
                <div class="code-actions">
                    <button id="btn-clear" class="btn-small" title="Clear">Clear</button>
                </div>
            </div>
            <textarea id="code-input" spellcheck="false" placeholder="코드를 여기에 입력하거나 붙여넣으세요..."></textarea>
        </div>

        <!-- Indentation & Line Options -->
        <div class="inline-options">
            <div class="option-row">
                <label class="checkbox-label">
                    <input type="checkbox" id="auto-indent" checked>
                    Auto-fix indent on paste
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="show-line-numbers">
                    Line numbers
                </label>
                <div class="option-group inline">
                    <label for="indent-size">Indent</label>
                    <select id="indent-size">
                        <option value="2">2 spaces</option>
                        <option value="4" selected>4 spaces</option>
                        <option value="8">8 spaces</option>
                    </select>
                </div>
                <button id="btn-reindent" class="btn-small">Reindent</button>
            </div>
            <div class="option-row">
                <div class="option-group inline">
                    <label for="highlight-lines">Highlight lines</label>
                    <input type="text" id="highlight-lines" placeholder="예: 3, 5-7" class="input-small">
                </div>
            </div>
        </div>

        <!-- Preview -->
        <div class="preview-section">
            <div class="section-header">
                <label>Preview</label>
                <span class="preview-hint">Google Docs에 붙여넣을 때의 모습</span>
            </div>
            <div id="preview-area" class="preview-area"></div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button id="btn-copy-block" class="btn-primary">
                Copy Code Block
            </button>
            <button id="btn-copy-inline" class="btn-secondary">
                Copy Inline
            </button>
        </div>

        </div>
        <!-- End Code Mode -->

        <!-- Math Mode Section -->
        <div id="math-mode-content" class="mode-content">
            <div class="math-section">
                <div class="section-header">
                    <label>LaTeX Formula</label>
                    <div class="code-actions">
                        <button id="btn-clear-math" class="btn-small" title="Clear">Clear</button>
                    </div>
                </div>
                <textarea id="math-input" spellcheck="false" placeholder="예: x = \\frac{-b \\pm \\sqrt{b^2-4ac}}{2a}"></textarea>
            </div>

            <!-- Math Preview -->
            <div class="preview-section">
                <div class="section-header">
                    <label>Preview</label>
                    <span class="preview-hint">Google Docs에 붙여넣을 때의 모습</span>
                </div>
                <div id="math-preview-area" class="preview-area math-preview"></div>
            </div>

            <!-- Math Action Buttons -->
            <div class="action-buttons">
                <button id="btn-copy-math-block" class="btn-primary">
                    Copy Formula
                </button>
                <button id="btn-copy-math-inline" class="btn-secondary">
                    Copy Inline Formula
                </button>
            </div>
        </div>
        <!-- End Math Mode -->

        <!-- Toast notification -->
        <div id="toast" class="toast hidden"></div>
    </div>

    <script src="themes.js"></script>
    <script src="app.js"></script>
    <script src="math.js"></script>
</body>
</html>
